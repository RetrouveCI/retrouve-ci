name: Test CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group:
    test-ci-${{ github.workflow }}-${{ github.event.pull_request.number ||
    github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Format, types, lint & tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm exec turbo run build --filter=@retrouve-ci/database

      - name: Format check
        run: pnpm format:check

      - name: Type check
        run: pnpm check-types

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test
