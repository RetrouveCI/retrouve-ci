name: Docker

on:
  push:
    tags:
      - '*.*.*'

jobs:
  build-and-push:
    name: Build & push ${{ matrix.app }} image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            image: retrouveci-api
          - app: client
            image: retrouveci-client
          - app: admin
            image: retrouveci-admin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN  }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}

  deploy:
    name: Trigger Dokploy deployment
    runs-on: ubuntu-latest
    needs: build-and-push
    if: vars.DOKPLOY_WEBHOOK_URL != ''
    steps:
      - name: Trigger Dokploy webhook
        run: curl -sSf -X POST "${{ vars.DOKPLOY_WEBHOOK_URL }}"
